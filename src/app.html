  <!-- Basic metadata -->
<title>Granthalay — Your Personal EPUB Reader</title>

<meta property="og:title" content="Granthalay — Your Personal EPUB Reader" />

	property="og:description"
	content="Read EPUB books instantly in your browser. Install as a PWA, read offline, and keep your books on your device—no sign-up, no cloud sync, fully client-side."
/>

<meta property="og:site_name" content="Granthalay" />
<meta property="og:url" content="https://samsterzero.github.io/reader/" />

<meta property="og:image:alt" content="Granthalay EPUB Reader app icon" />

<meta property="og:image:height" content="512" />

<meta
	name="twitter:description"
	content="Read EPUB books instantly in your browser. Offline-first, installable, and fully client-side."
/>
<meta name="twitter:image" content="https://samsterzero.github.io/reader/icon-512.png" />
